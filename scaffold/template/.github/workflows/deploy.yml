name: Build and Deploy

on:
  push:
    tags:
      - "v*"
      - "staging-v*"

jobs:
  resolve-env:
    runs-on: ubuntu-24.04
    outputs:
      deploy_env: ${{ steps.env.outputs.deploy_env }}
      version: ${{ steps.env.outputs.version }}
      r2_prefix: ${{ steps.env.outputs.r2_prefix }}
    steps:
      - name: Determine environment from tag
        id: env
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          if [[ "${GIT_TAG}" == staging-* ]]; then
            DEPLOY_ENV="staging"
            VERSION="${GIT_TAG#staging-}"
          else
            DEPLOY_ENV="production"
            VERSION="${GIT_TAG}"
          fi
          echo "deploy_env=${DEPLOY_ENV}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "r2_prefix=deploy/${DEPLOY_ENV}" >> "$GITHUB_OUTPUT"
          echo "Environment: ${DEPLOY_ENV}, Version: ${VERSION}"

  build-rust:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        run: |
          SCCACHE_VERSION="v0.9.1"
          curl -fsSL "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz
          sudo mv "sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/
          sccache --version
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build Rust release binaries
        env:
          RUSTC_WRAPPER: sccache
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
        run: cargo build --release --locked -p rustforge-starter --bin api-server --bin websocket-server --bin worker --bin console

      - name: Upload Rust binaries
        uses: actions/upload-artifact@v7
        with:
          name: rust-binaries
          path: |
            target/release/api-server
            target/release/websocket-server
            target/release/worker
            target/release/console
          retention-days: 1

  build-frontend:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        env:
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
          VITE_S3_URL: ${{ secrets.VITE_S3_URL }}
        run: npm --prefix frontend run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: public/
          retention-days: 1

  package-and-deploy:
    needs: [resolve-env, build-rust, build-frontend]
    runs-on: ubuntu-24.04
    env:
      DEPLOY_ENV: ${{ needs.resolve-env.outputs.deploy_env }}
      VERSION_TAG: ${{ needs.resolve-env.outputs.version }}
      R2_PREFIX: ${{ needs.resolve-env.outputs.r2_prefix }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          sparse-checkout: |
            bin
            app/settings.toml
            app/src/seeds
            migrations
            i18n
            scripts
            console
            .env.example

      - name: Download Rust binaries
        uses: actions/download-artifact@v8
        with:
          name: rust-binaries
          path: target/release/

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: public/

      - name: Package release.zip
        run: |
          echo "Packaging for ${DEPLOY_ENV}: ${VERSION_TAG}"

          STAGING="staging"
          mkdir -p "${STAGING}/bin"
          mkdir -p "${STAGING}/target/release"
          mkdir -p "${STAGING}/app/src/seeds"
          mkdir -p "${STAGING}/scripts"

          # Wrapper scripts
          cp bin/api-server bin/websocket-server bin/worker bin/console "${STAGING}/bin/"

          # Compiled binaries
          cp target/release/api-server target/release/websocket-server target/release/worker target/release/console "${STAGING}/target/release/"

          # Runtime config
          cp app/settings.toml "${STAGING}/app/settings.toml"

          # Seeder source files
          cp -r app/src/seeds/* "${STAGING}/app/src/seeds/"

          # Built frontend + static assets
          cp -r public "${STAGING}/public"

          # Migrations
          cp -r migrations "${STAGING}/migrations"

          # Translations
          cp -r i18n "${STAGING}/i18n"

          # Scripts (install-ubuntu.sh ships as install.sh in the release)
          cp scripts/install-ubuntu.sh "${STAGING}/scripts/install.sh"
          cp scripts/deploy-poll.sh "${STAGING}/scripts/deploy-poll.sh"
          chmod +x "${STAGING}/scripts/install.sh" "${STAGING}/scripts/deploy-poll.sh"

          # Console wrapper (root-level)
          cp console "${STAGING}/console"
          chmod +x "${STAGING}/console"

          # Env example
          cp .env.example "${STAGING}/.env.example"

          # Version file
          echo "${VERSION_TAG}" > "${STAGING}/VERSION"

          # Create zip
          cd "${STAGING}"
          zip -r ../release.zip .
          cd ..

      - name: Generate checksums
        run: sha256sum release.zip > SHA256SUMS

      - name: Upload artifacts to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          echo "Uploading to ${R2_PREFIX}/${VERSION_TAG}/"

          # Upload versioned artifacts
          aws s3 cp release.zip "s3://${R2_BUCKET}/${R2_PREFIX}/${VERSION_TAG}/release.zip" --endpoint-url "${R2_ENDPOINT}"
          aws s3 cp SHA256SUMS "s3://${R2_BUCKET}/${R2_PREFIX}/${VERSION_TAG}/SHA256SUMS" --endpoint-url "${R2_ENDPOINT}"

          # Update VERSION pointer for this environment
          echo "${VERSION_TAG}" > VERSION
          aws s3 cp VERSION "s3://${R2_BUCKET}/${R2_PREFIX}/VERSION" --endpoint-url "${R2_ENDPOINT}"

      - name: Cleanup old versions (retain 3 per environment)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          # List all version prefixes under this environment, sort descending, skip first 3, delete the rest
          PREFIXES=$(aws s3api list-objects-v2 \
            --bucket "${R2_BUCKET}" \
            --prefix "${R2_PREFIX}/v" \
            --delimiter "/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --query "CommonPrefixes[].Prefix" \
            --output text 2>/dev/null || true)

          if [ -n "${PREFIXES}" ]; then
            echo "${PREFIXES}" | tr '\t' '\n' | sort -r | tail -n +4 | while read -r prefix; do
              if [ -n "${prefix}" ]; then
                echo "Deleting old version: ${prefix}"
                aws s3 rm "s3://${R2_BUCKET}/${prefix}" --recursive --endpoint-url "${R2_ENDPOINT}"
              fi
            done
          fi
