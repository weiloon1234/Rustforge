name: Build and Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Rust release binaries
        run: cargo build --release -p rustforge-starter --bin api-server --bin websocket-server --bin worker --bin console

      - name: Build frontend
        env:
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
          VITE_S3_URL: ${{ secrets.VITE_S3_URL }}
        run: npm --prefix frontend run build

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Package release.zip
        run: |
          STAGING="staging"
          mkdir -p "${STAGING}/bin"
          mkdir -p "${STAGING}/target/release"
          mkdir -p "${STAGING}/app/src/seeds"
          mkdir -p "${STAGING}/scripts"

          # Wrapper scripts
          cp bin/api-server bin/websocket-server bin/worker bin/console "${STAGING}/bin/"

          # Compiled binaries
          cp target/release/api-server target/release/websocket-server target/release/worker target/release/console "${STAGING}/target/release/"

          # Runtime config
          cp app/configs.toml "${STAGING}/app/configs.toml"

          # Seeder source files
          cp -r app/src/seeds/* "${STAGING}/app/src/seeds/"

          # Built frontend + static assets
          cp -r public "${STAGING}/public"

          # Migrations
          cp -r migrations "${STAGING}/migrations"

          # Translations
          cp -r i18n "${STAGING}/i18n"

          # Scripts (install-ubuntu.sh ships as install.sh in the release)
          cp scripts/install-ubuntu.sh "${STAGING}/scripts/install.sh"
          cp scripts/deploy-poll.sh "${STAGING}/scripts/deploy-poll.sh"
          chmod +x "${STAGING}/scripts/install.sh" "${STAGING}/scripts/deploy-poll.sh"

          # Console wrapper (root-level)
          cp console "${STAGING}/console"
          chmod +x "${STAGING}/console"

          # Env example
          cp .env.example "${STAGING}/.env.example"

          # Version file
          echo "${{ steps.version.outputs.tag }}" > "${STAGING}/VERSION"

          # Create zip
          cd "${STAGING}"
          zip -r ../release.zip .
          cd ..

      - name: Generate checksums
        run: sha256sum release.zip > SHA256SUMS

      - name: Upload artifacts to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          VERSION_TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Upload versioned artifacts
          aws s3 cp release.zip "s3://${R2_BUCKET}/deploy/${VERSION_TAG}/release.zip" --endpoint-url "${R2_ENDPOINT}"
          aws s3 cp SHA256SUMS "s3://${R2_BUCKET}/deploy/${VERSION_TAG}/SHA256SUMS" --endpoint-url "${R2_ENDPOINT}"

          # Update VERSION pointer
          echo "${VERSION_TAG}" > VERSION
          aws s3 cp VERSION "s3://${R2_BUCKET}/deploy/VERSION" --endpoint-url "${R2_ENDPOINT}"

      - name: Cleanup old versions (retain 3)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          # List all version prefixes, sort descending, skip first 3, delete the rest
          PREFIXES=$(aws s3api list-objects-v2 \
            --bucket "${R2_BUCKET}" \
            --prefix "deploy/v" \
            --delimiter "/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --query "CommonPrefixes[].Prefix" \
            --output text 2>/dev/null || true)

          if [ -n "${PREFIXES}" ]; then
            echo "${PREFIXES}" | tr '\t' '\n' | sort -r | tail -n +4 | while read -r prefix; do
              if [ -n "${prefix}" ]; then
                echo "Deleting old version: ${prefix}"
                aws s3 rm "s3://${R2_BUCKET}/${prefix}" --recursive --endpoint-url "${R2_ENDPOINT}"
              fi
            done
          fi
